<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:      #1a1a2e;
    --ink-soft: #4a4a6a;
    --ink-mute: #8888aa;
    --surface:  #f7f7fb;
    --card-bg:  #ffffff;
    --accent:   #2e5bff;
    --accent-2: #e84393;
    --rule:     #e8e8f0;
    --tag-bg:   #eef0ff;
    --tag-txt:  #2e5bff;
    --shadow-sm: 0 1px 4px rgba(30,30,80,.06), 0 2px 12px rgba(30,30,80,.07);
    --shadow-md: 0 4px 24px rgba(30,30,80,.12), 0 1px 4px rgba(30,30,80,.06);
    --shadow-lg: 0 20px 60px rgba(30,30,80,.18);
    --radius:   16px;
    --transition: .22s cubic-bezier(.4,0,.2,1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--surface);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--ink);
    color: #fff;
    padding: 48px 5vw 40px;
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 80% at 90% 50%, rgba(46,91,255,.35) 0%, transparent 65%),
                radial-gradient(ellipse 40% 60% at 10% 80%, rgba(232,67,147,.2) 0%, transparent 60%);
    pointer-events: none;
  }
  .header-inner { position: relative; max-width: 1100px; margin: auto; }
  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(255,255,255,.5);
    margin-bottom: 10px;
  }
  .site-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.6rem, 3.5vw, 2.6rem);
    font-weight: 700;
    line-height: 1.2;
    color: #fff;
    margin-bottom: 6px;
  }
  .site-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,.5);
    font-weight: 400;
    margin-bottom: 28px;
  }
  .header-meta {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .meta-pill {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 12px;
    color: rgba(255,255,255,.75);
    font-weight: 500;
  }

  /* ── SECTION TABS ── */
  .tabs-bar {
    background: var(--card-bg);
    border-bottom: 1px solid var(--rule);
    padding: 0 5vw;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    gap: 0;
  }
  .tab-btn {
    padding: 16px 20px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-mute);
    background: none;
    border: none;
    border-bottom: 2.5px solid transparent;
    cursor: pointer;
    transition: color var(--transition), border-color var(--transition);
    white-space: nowrap;
  }
  .tab-btn.active, .tab-btn:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── MAIN ── */
  .main { max-width: 1100px; margin: 0 auto; padding: 40px 5vw 80px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label span {
    background: var(--tag-bg);
    color: var(--tag-txt);
    border-radius: 100px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 700;
  }

  /* ── GRID ── */
  .staff-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 52px;
  }

  /* ── CARD ── */
  .staff-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition);
    border: 1px solid var(--rule);
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .staff-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
  }
  .staff-card:hover .card-photo img { transform: scale(1.04); }

  .card-photo {
    width: 100%;
    height: 180px;
    overflow: hidden;
    background: linear-gradient(135deg, #e8eaff 0%, #f0e8ff 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .card-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
  }
  .card-photo .avatar-initials {
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--accent);
    opacity: .35;
    font-family: 'Playfair Display', serif;
    pointer-events: none;
    user-select: none;
  }

  .designation-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--ink);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 100px;
  }
  .designation-badge.principal { background: var(--accent); }

  .card-body {
    padding: 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .card-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }
  .card-subject {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .card-dob {
    font-size: 11px;
    color: var(--ink-mute);
    margin-top: 2px;
  }
  .card-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .phd-badge {
    font-size: 10px;
    font-weight: 700;
    background: #e8f5e9;
    color: #2e7d32;
    padding: 2px 8px;
    border-radius: 100px;
  }
  .net-badge {
    font-size: 10px;
    font-weight: 700;
    background: #fff3e0;
    color: #e65100;
    padding: 2px 8px;
    border-radius: 100px;
  }
  .view-hint {
    font-size: 10px;
    color: var(--ink-mute);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .view-hint::after {
    content: '→';
    font-size: 12px;
    color: var(--accent);
  }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 20, 40, 0.75);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition);
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  /* ── MODAL PANEL ── */
  .modal {
    background: var(--card-bg);
    border-radius: 24px;
    width: 100%;
    max-width: 680px;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    transform: translateY(24px) scale(.97);
    transition: transform var(--transition);
    position: relative;
  }
  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-header {
    display: flex;
    gap: 24px;
    padding: 32px 32px 24px;
    border-bottom: 1px solid var(--rule);
    align-items: flex-start;
  }
  .modal-photo {
    width: 100px;
    height: 120px;
    border-radius: 12px;
    overflow: hidden;
    flex-shrink: 0;
    background: linear-gradient(135deg, #e8eaff 0%, #f0e8ff 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    opacity: .4;
  }
  .modal-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 1; }
  .modal-title-block { flex: 1; min-width: 0; }
  .modal-designation {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .modal-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .modal-father {
    font-size: 12px;
    color: var(--ink-mute);
    margin-bottom: 10px;
  }
  .modal-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .modal-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    border: 1.5px solid var(--rule);
    color: var(--ink-soft);
  }
  .modal-tag.green { border-color: #b2dfdb; background: #e8f5e9; color: #2e7d32; }
  .modal-tag.orange { border-color: #ffe0b2; background: #fff3e0; color: #e65100; }
  .modal-tag.blue { border-color: #c5cae9; background: var(--tag-bg); color: var(--accent); }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--rule);
    background: var(--surface);
    cursor: pointer;
    font-size: 16px;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition);
  }
  .modal-close:hover { background: var(--rule); color: var(--ink); }

  .modal-body { padding: 24px 32px 32px; }

  .info-section { margin-bottom: 24px; }
  .info-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 20px;
  }
  .info-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .info-row.wide { grid-column: 1/-1; }
  .info-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .info-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
  }

  .marks-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .mark-chip {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 8px 12px;
    text-align: center;
    min-width: 70px;
  }
  .mark-chip .val {
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
  }
  .mark-chip .lbl {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-top: 2px;
  }
  .mark-chip.na .val { color: var(--ink-mute); font-size: 14px; }

  .aadhar-row {
    font-size: 13px;
    color: var(--ink-soft);
    font-family: 'Courier New', monospace;
    letter-spacing: .08em;
    background: var(--surface);
    padding: 6px 12px;
    border-radius: 8px;
    display: inline-block;
    margin-top: 4px;
  }

  /* ── SCROLLBAR ── */
  .modal::-webkit-scrollbar { width: 5px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 10px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 520px) {
    .modal-header { flex-direction: column; gap: 16px; }
    .modal-photo { width: 80px; height: 96px; }
    .modal-body, .modal-header { padding-left: 20px; padding-right: 20px; }
    .info-grid { grid-template-columns: 1fr; }
    .mark-chip { min-width: 60px; }
  }
</style>
</head>

      grad: "B.A. 64",
      postGrad: "M.A. 65",
      profI: "B.Ed. 68",
      profII: "M.Ed. 77",
      net: "Ph.D – Education (Jain Vishva Bharti Institute, Ladnun) · PG Diploma (Career Guidance and Counselling)",
      experience: "—",
      initials: "RS"
    }
  ]
};

function getPhDTag(net) {
  if (!net || net === '—') return '';
  if (net.toLowerCase().includes('ph.d') || net.toLowerCase().includes('ph. d')) return 'phd';
  if (net.toLowerCase().includes('net')) return 'net';
  if (net.toLowerCase().includes('m.phil')) return 'mphil';
  return 'other';
}

function buildCard(person) {
  const tag = getPhDTag(person.net);
  const isPrincipal = person.designation.toLowerCase().includes('principal');
  const badgeClass = isPrincipal ? 'designation-badge principal' : 'designation-badge';

  let badgeHtml = '';
  if (tag === 'phd') badgeHtml = `<span class="phd-badge">Ph.D</span>`;
  else if (tag === 'net') badgeHtml = `<span class="net-badge">NET</span>`;
  else if (tag === 'mphil') badgeHtml = `<span class="net-badge">M.Phil</span>`;

  const card = document.createElement('div');
  card.className = 'staff-card';
  card.onclick = () => openModal(person);
  card.innerHTML = `
    <div class="card-photo">
      <div class="avatar-initials">${person.initials}</div>
      <span class="${badgeClass}">${person.designation}</span>
    </div>
    <div class="card-body">
      <div class="card-name">${person.name}</div>
      <div class="card-subject">${person.subject}</div>
      <div class="card-dob">DOB: ${person.dob}</div>
    </div>
    <div class="card-footer">
      ${badgeHtml || '<span></span>'}
      <span class="view-hint">View profile</span>
    </div>
  `;
  return card;
}

function renderGrids() {
  const ftGrid = document.getElementById('grid-full-time');
  const ptGrid = document.getElementById('grid-part-time');
  staff.fullTime.forEach(p => ftGrid.appendChild(buildCard(p)));
  staff.partTime.forEach(p => ptGrid.appendChild(buildCard(p)));
}

function showSection(which) {
  document.getElementById('section-full-time').style.display = which === 'full-time' ? '' : 'none';
  document.getElementById('section-part-time').style.display = which === 'part-time' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && which === 'full-time') || (i === 1 && which === 'part-time'));
  });
}

function openModal(person) {
  const tag = getPhDTag(person.net);
  let tagHtml = `<span class="modal-tag blue">${person.category}</span>`;
  if (tag === 'phd') tagHtml += `<span class="modal-tag green">Ph.D Holder</span>`;
  if (tag === 'net') tagHtml += `<span class="modal-tag orange">UGC-NET</span>`;
  if (tag === 'mphil') tagHtml += `<span class="modal-tag orange">M.Phil</span>`;

  const header = document.getElementById('modalHeader');
  header.innerHTML = `
    <div class="modal-photo"><div>${person.initials}</div></div>
    <div class="modal-title-block">
      <div class="modal-designation">${person.designation} · ${person.subject}</div>
      <div class="modal-name">${person.name}</div>
      <div class="modal-father">${person.gender} ${person.father}</div>
      <div class="modal-tags">${tagHtml}</div>
    </div>
  `;

  function mark(val) {
    if (!val || val === '—') return `<div class="mark-chip na"><div class="val">—</div><div class="lbl">N/A</div></div>`;
    const parts = val.split(' ');
    const pct = parts[parts.length - 1];
    const label = parts.slice(0, -1).join(' ') || 'Marks';
    if (!isNaN(parseFloat(pct))) {
      return `<div class="mark-chip"><div class="val">${pct}%</div><div class="lbl">${label}</div></div>`;
    }
    return `<div class="mark-chip"><div class="val">${val}</div><div class="lbl">Degree</div></div>`;
  }

  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <div class="info-section">
      <div class="info-section-title">Personal Details</div>
      <div class="info-grid">
        <div class="info-row">
          <span class="info-label">Date of Birth</span>
          <span class="info-value">${person.dob}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Category</span>
          <span class="info-value">${person.category}</span>
        </div>
        <div class="info-row wide">
          <span class="info-label">Aadhar Card No.</span>
          <span class="aadhar-row">${person.aadhar}</span>
        </div>
      </div>
    </div>

    <div class="info-section">
      <div class="info-section-title">Academic Marks</div>
      <div class="marks-row">
        <div class="mark-chip"><div class="val">${person.plus2}%</div><div class="lbl">Plus 2</div></div>
        ${mark(person.grad)}
        ${mark(person.postGrad)}
        ${mark(person.profI)}
        ${mark(person.profII)}
      </div>
    </div>

    <div class="info-section">
      <div class="info-section-title">Highest Qualification / NET · Ph.D</div>
      <div class="info-grid">
        <div class="info-row wide">
          <span class="info-label">Qualification</span>
          <span class="info-value">${person.net || '—'}</span>
        </div>
        ${person.experience && person.experience !== '—' ? `
        <div class="info-row">
          <span class="info-label">Teaching Experience</span>
          <span class="info-value">${person.experience}</span>
        </div>` : ''}
      </div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

renderGrids();
</script>
</body>
</html>
